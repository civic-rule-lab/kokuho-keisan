<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Civic Exchange｜自治体制度ポータル</title>
<link rel="stylesheet" href="./css/selector.css">
</head>

<body>

<div class="wrap">
<div class="subtitle">自治体制度の情報サービス</div>

<div class="brand">Civic Exchange</div>

<div class="tagline">市民 ↔ 制度</div>

<div class="lead">
自治体制度ページへの入口です。<br>
都道府県・自治体・制度・ページを選択してください。
</div>

<div class="quick-links">

<div class="quick-links-title">よく使う制度</div>

<a class="quick-link" href="./title-test.html">
茅ヶ崎市 国保 かんたん計算
</a>

<a class="quick-link" href="./kokuho-income.html">
茅ヶ崎市 国保 所得ベース計算
</a>

</div>

<label for="prefecture">都道府県</label>

<select id="prefecture" onchange="updateMunicipalities()">
<option value="kanagawa">神奈川県</option>
</select>

<label for="municipality">自治体</label>

<select id="municipality" onchange="updateSystems()">
<option value="chigasaki">茅ヶ崎市</option>
</select>

<label for="system">制度</label>

<select id="system" onchange="updatePages()">
<option value="kokuho">国民健康保険</option>
</select>

<label for="pageType">ページ</label>

<select id="pageType" onchange="updateCurrent()">
<option value="simple">かんたん計算</option>
<option value="income">所得ベース計算</option>
</select>

<div class="current-select" id="currentSelect">

神奈川県 / 茅ヶ崎市 / 国民健康保険 / かんたん計算

</div>

<button onclick="goPage()">

このページを開く

</button>

<div class="note">

※現在はテスト版のため、神奈川県・茅ヶ崎市・国民健康保険のみ対応しています。<br>
※今後、自治体・制度・ページ種別を順次追加予定です。

</div>

</div>


  <script src="./js/selector.js"></script>
</body>
</html>
