<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>国民健康保険料計算｜茅ヶ崎市 国保計算ツール</title>

<style>
body{
  font-family:sans-serif;
  margin:0;
  padding:20px;
  background:linear-gradient(180deg,#eef2ff 0%,#f8fafc 100%);
  color:#222;
}

  max-width:720px;
  margin:0 auto;
  background:#ffffff;
  padding:24px 20px 28px;
  border-radius:18px;
  border:1px solid #e5e7eb;
  box-shadow:0 10px 30px rgba(0,0,0,0.05);
  box-sizing:border-box;
}

h1{
  font-size:28px;
  margin:0 0 6px 0;
  font-weight:700;
  line-height:1.4;
  color:#0f172a;
}

.subtitle{
  font-size:14px;
  color:#6b7280;
  margin-bottom:28px;
}

label{
  display:block;
  font-size:15px;
  font-weight:700;
  margin-top:22px;
  margin-bottom:8px;
  color:#111827;
}

input{
  width:100%;
  padding:14px 12px;
  font-size:22px;
  font-weight:500;
  font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  border:2px solid #cbd5e1;
  border-radius:12px;
  background:#ffffff;
  color:#0f172a;
  box-sizing:border-box;
}

input:focus{
  outline:none;
  border-color:#2563eb;
  box-shadow:0 0 0 3px rgba(37,99,235,0.15);
}

input::placeholder{
  color:#9ca3af;
  font-size:22px;
  font-weight:400;
  font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
}

button{
  width:100%;
  margin-top:28px;
  padding:16px;
  font-size:18px;
  font-weight:700;
  border:none;
  border-radius:999px;
  background:#1d4ed8;
  color:#ffffff;
  cursor:pointer;
  box-shadow:0 6px 16px rgba(0,0,0,0.15);
}

button:hover{
  background:#1e40af;
}

button:active{
  transform:translateY(1px);
}

.result-title{
  margin-top:34px;
  font-size:18px;
  font-weight:700;
  color:#111827;
}

#result{
  margin-top:14px;
  padding:18px 16px;
  background:#f8fafc;
  border:2px solid #e5e7eb;
  border-radius:14px;
  min-height:28px;
  line-height:1.8;
  color:#111827;
  box-sizing:border-box;
}

.result-row{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:12px;
  margin-bottom:8px;
}

.result-label{
  font-size:17px;
  color:#374151;
  flex:1;
}

.amount{
  font-size:20px;
  font-weight:700;
  color:#0f172a;
  font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  text-align:right;
  white-space:nowrap;
}

.divider{
  margin:16px 0;
  border-top:2px solid #e5e7eb;
}

.total-title{
  font-size:18px;
  font-weight:700;
  color:#111827;
  margin-bottom:8px;
}

.total{
  display:block;
  font-size:40px;
  font-weight:800;
  line-height:1.2;
  color:#0f172a;
  font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  margin-bottom:8px;
}

.monthly{
  font-size:16px;
  font-weight:600;
  color:#475569;
  font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
}

.section-title{
  margin-top:20px;
  margin-bottom:10px;
  font-size:16px;
  font-weight:700;
  color:#111827;
}

.percent-box{
  margin-top:8px;
  padding:14px;
  background:#ffffff;
  border:1px solid #e5e7eb;
  border-radius:12px;
}

.percent-item{
  display:flex;
  justify-content:space-between;
  gap:12px;
  margin-bottom:8px;
  font-size:14px;
  color:#374151;
}

.percent-item:last-child{
  margin-bottom:0;
}

.reduction-box{
  margin-top:16px;
  padding:14px;
  background:#eff6ff;
  border:1px solid #bfdbfe;
  border-radius:12px;
}

.reduction-title{
  font-size:15px;
  font-weight:700;
  color:#1d4ed8;
  margin-bottom:8px;
}

.reduction-main{
  font-size:18px;
  font-weight:800;
  color:#0f172a;
  margin-bottom:6px;
}

.reduction-sub{
  font-size:13px;
  line-height:1.8;
  color:#475569;
}

.link-box{
  margin-top:18px;
  font-size:14px;
  line-height:1.7;
  color:#374151;
}

.link-box a{
  color:#2563eb;
  font-weight:600;
  text-decoration:none;
}

.link-box a:hover{
  text-decoration:underline;
}

.note{
  margin-top:18px;
  font-size:13px;
  line-height:1.8;
  color:#6b7280;
}
</style>
</head>

<body>

<div class="wrap">

  <h1>茅ヶ崎市 国保計算ツール</h1>
  <div class="subtitle">（国民健康保険料シミュレーション）</div>

  <label for="income">前年所得</label>
  <input id="income" type="text" inputmode="numeric" placeholder="例：3,000,000" onblur="formatNumber(this)">

  <label for="family">世帯人数</label>
  <input id="family" type="number" placeholder="例：3">

  <label for="preschool">未就学児人数（0〜6歳）</label>
  <input id="preschool" type="number" placeholder="例：1">

  <label for="care">介護保険人数（40〜64歳）</label>
  <input id="care" type="number" placeholder="例：1">

  <button onclick="calc()">計算する</button>

  <div class="result-title">計算結果</div>

  <div id="result">
    ここに結果が表示されます
  </div>

  <div class="link-box">
    個人事業主の方など、所得で計算したい方は
    <a href="#" onclick="return false;">こちら</a>
  </div>

  <div class="note">
    ※このページは茅ヶ崎市向けの簡易計算版です。<br>
    ※基礎控除43万円を差し引いた簡易計算です。<br>
    ※軽減判定はA版の目安判定です。正式な判定ではありません。<br>
    ※未就学児軽減は均等割のみを対象に簡易反映しています。<br>
    ※給与所得者等の数、月割り、正式な所得判定などはまだ反映していません。<br>
    ※実際の保険料は自治体の通知や公式案内でご確認ください。
  </div>

</div>

<script>
function formatNumber(input){
  let value = input.value.replace(/,/g, "").replace(/[^\d]/g, "");
  if(value === ""){
    input.value = "";
    return;
  }
  input.value = Number(value).toLocaleString();
}

function yen(value){
  return value.toLocaleString() + "円";
}

function percent(value, total){
  if(total <= 0) return "0.0%";
  return ((value / total) * 100).toFixed(1) + "%";
}

// A版：世帯人数と前年所得だけでみる簡易判定
function getReductionLevel(totalIncome, familyCount){
  const limit7 = 430000;
  const limit5 = 430000 + (305000 * familyCount);
  const limit2 = 430000 + (560000 * familyCount);

  if(totalIncome <= limit7){
    return { rate: 0.7, label: "7割軽減の可能性" };
  }
  if(totalIncome <= limit5){
    return { rate: 0.5, label: "5割軽減の可能性" };
  }
  if(totalIncome <= limit2){
    return { rate: 0.2, label: "2割軽減の可能性" };
  }
  return { rate: 0, label: "軽減なしの可能性" };
}

function calc(){
  let income = document.getElementById("income").value.replace(/,/g, "");
  income = Number(income);

  const family = Number(document.getElementById("family").value) || 0;
  const preschool = Number(document.getElementById("preschool").value) || 0;
  const care = Number(document.getElementById("care").value) || 0;

  if(!income && income !== 0){
    document.getElementById("result").innerText = "前年所得を入力してください";
    return;
  }

  const taxable = Math.max(0, income - 430000);

  // 茅ヶ崎市 令和7年度料率（簡易反映）
  const medicalRate = 0.0666;
  const supportRate = 0.0277;
  const careRate = 0.0262;

  const medicalPerCapita = 22432;
  const supportPerCapita = 9231;
  const carePerCapita = 9485;

  const medicalHousehold = 27755;
  const supportHousehold = 11421;
  const careHousehold = 8789;

  const medicalLimit = 660000;
  const supportLimit = 260000;
  const careLimit = 170000;

  // 軽減判定（A版）
  const reduction = getReductionLevel(income, family);

  // 未就学児軽減前に、均等割・平等割へ7/5/2割軽減を適用
  const reductionFactor = 1 - reduction.rate;

  const medicalPerCapitaReduced = medicalPerCapita * reductionFactor;
  const supportPerCapitaReduced = supportPerCapita * reductionFactor;
  const carePerCapitaReduced = carePerCapita * reductionFactor;

  const medicalHouseholdReduced = medicalHousehold * reductionFactor;
  const supportHouseholdReduced = supportHousehold * reductionFactor;
  const careHouseholdReduced = careHousehold * reductionFactor;

  // 未就学児軽減：均等割のみ、軽減後の均等割からさらに50%減
  const nonPreschoolCount = Math.max(0, family - preschool);

  const medicalPerCapitaTotal =
    (nonPreschoolCount * medicalPerCapitaReduced) +
    (preschool * medicalPerCapitaReduced * 0.5);

  const supportPerCapitaTotal =
    (nonPreschoolCount * supportPerCapitaReduced) +
    (preschool * supportPerCapitaReduced * 0.5);

  // 介護分は未就学児対象外
  const carePerCapitaTotal = care * carePerCapitaReduced;

  const medicalRaw =
    Math.floor(taxable * medicalRate) +
    Math.round(medicalPerCapitaTotal) +
    Math.round(medicalHouseholdReduced);

  const supportRaw =
    Math.floor(taxable * supportRate) +
    Math.round(supportPerCapitaTotal) +
    Math.round(supportHouseholdReduced);

  const careRaw =
    Math.floor(taxable * careRate) +
    Math.round(carePerCapitaTotal) +
    Math.round(careHouseholdReduced);

  const medical = Math.min(medicalRaw, medicalLimit);
  const support = Math.min(supportRaw, supportLimit);
  const careFee = Math.min(careRaw, careLimit);

  const total = medical + support + careFee;
  const monthly = Math.round(total / 12);

  document.getElementById("result").innerHTML = `
    <div class="result-row">
      <div class="result-label">医療分</div>
      <div class="amount">${yen(medical)}</div>
    </div>

    <div class="result-row">
      <div class="result-label">後期支援金分</div>
      <div class="amount">${yen(support)}</div>
    </div>

    <div class="result-row">
      <div class="result-label">介護分</div>
      <div class="amount">${yen(careFee)}</div>
    </div>

    <div class="divider"></div>

    <div class="total-title">年間保険料合計</div>
    <span class="total">${total.toLocaleString()}円</span>
    <div class="monthly">月額目安：${yen(monthly)}</div>

    <div class="section-title">構成割合</div>
    <div class="percent-box">
      <div class="percent-item">
        <span>医療分の割合</span>
        <strong>${percent(medical, total)}</strong>
      </div>
      <div class="percent-item">
        <span>後期支援金分の割合</span>
        <strong>${percent(support, total)}</strong>
      </div>
      <div class="percent-item">
        <span>介護分の割合</span>
        <strong>${percent(careFee, total)}</strong>
      </div>
    </div>

    <div class="reduction-box">
      <div class="reduction-title">軽減判定（目安）</div>
      <div class="reduction-main">${reduction.label}</div>
      <div class="reduction-sub">
        この簡易版では、世帯人数と前年所得から 7割・5割・2割軽減の目安を判定しています。<br>
        未就学児人数は均等割の5割軽減として簡易反映しています。
      </div>
    </div>
  `;
}
</script>

</body>
</html>
