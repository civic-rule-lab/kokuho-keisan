<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>茅ヶ崎市 国保計算ツール</title>

<style>
body{
  font-family: sans-serif;
  margin: 0;
  padding: 20px;
  background: linear-gradient(180deg, #eef2ff 0%, #f8fafc 100%);
  color: #222;
}

.wrap{
  max-width: 720px;
  margin: 0 auto;
  background: #ffffff;
  padding: 24px 20px 28px;
  border-radius: 18px;
  border: 1px solid #e5e7eb;
  box-shadow: 0 10px 30px rgba(0,0,0,0.05);
  box-sizing: border-box;
}

h1{
  font-size: 28px;
  margin: 0 0 6px 0;
  font-weight: 700;
  color: #111827;
  line-height: 1.4;
}

.subtitle{
  font-size: 14px;
  color: #6b7280;
  margin-bottom: 28px;
}

label{
  display: block;
  font-size: 15px;
  font-weight: 700;
  margin-top: 22px;
  margin-bottom: 8px;
  color: #111827;
}

input{
  width: 100%;
  padding: 14px 12px;
  font-size: 16px;
  border: 2px solid #cbd5e1;
  border-radius: 12px;
  background: #ffffff;
  box-sizing: border-box;
}

input:focus{
  outline: none;
  border-color: #2563eb;
  box-shadow: 0 0 0 3px rgba(37,99,235,0.15);
}

button{
  width: 100%;
  margin-top: 28px;
  padding: 16px;
  font-size: 18px;
  font-weight: 700;
  border: none;
  border-radius: 999px;
  background: #1d4ed8;
  color: #ffffff;
  cursor: pointer;
  box-shadow: 0 6px 16px rgba(0,0,0,0.15);
}

button:hover{
  background: #1e40af;
}

button:active{
  transform: translateY(1px);
}

.result-title{
  margin-top: 34px;
  font-size: 20px;
  font-weight: 700;
  color: #111827;
}

#result{
  margin-top: 14px;
  padding: 18px 16px;
  background: #ffffff;
  border: 2px solid #e5e7eb;
  border-radius: 14px;
  min-height: 28px;
  line-height: 1.8;
  color: #111827;
}

.result-box{
  margin-bottom: 16px;
}

.result-row{
  display: flex;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 6px;
  flex-wrap: wrap;
}

.result-label{
  font-size: 16px;
  color: #374151;
}

.result-value{
  font-size: 16px;
  font-weight: 700;
  color: #111827;
}

.total-box{
  margin-top: 18px;
  padding-top: 16px;
  border-top: 2px solid #e5e7eb;
}

.total-label{
  font-size: 18px;
  font-weight: 700;
  color: #111827;
}

.total-value{
  display: block;
  margin-top: 8px;
  font-size: 34px;
  font-weight: 800;
  color: #0f172a;
  line-height: 1.2;
}

.sub-metric{
  margin-top: 8px;
  font-size: 14px;
  color: #475569;
}

.section-title{
  margin-top: 18px;
  margin-bottom: 10px;
  font-size: 15px;
  font-weight: 700;
  color: #111827;
}

.percent-list{
  margin-top: 8px;
  padding: 14px 14px 10px;
  background: #f8fafc;
  border-radius: 12px;
  border: 1px solid #e5e7eb;
}

.percent-item{
  display: flex;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 8px;
  flex-wrap: wrap;
  font-size: 14px;
}

.note{
  margin-top: 22px;
  font-size: 13px;
  line-height: 1.8;
  color: #6b7280;
}

.portal-link{
  display: inline-block;
  margin-top: 18px;
  font-size: 14px;
  color: #2563eb;
  text-decoration: none;
}

.portal-link:hover{
  text-decoration: underline;
}

.small{
  font-size: 13px;
  color: #64748b;
}
</style>
</head>

<body>
<div class="wrap">

  <h1>茅ヶ崎市 国保計算ツール</h1>
  <div class="subtitle">（国民健康保険料）</div>

  <label for="income">前年所得</label>
  <input id="income" type="number" placeholder="例：3000000">

  <label for="family">世帯人数</label>
  <input id="family" type="number" placeholder="例：3">

  <label for="care">介護保険人数（40〜64歳）</label>
  <input id="care" type="number" placeholder="例：1">

  <button onclick="calc()">計算する</button>

  <div class="result-title">計算結果</div>

  <div id="result">
    ここに結果が表示されます
  </div>

  <div class="note">
    ※このページは茅ヶ崎市の令和7年度保険料率をもとにした簡易計算版です。<br>
    ※軽減制度・月割り・未就学児軽減・正式な所得判定はまだ反映していません。<br>
    ※実際の保険料は市の通知や公式案内でご確認ください。
  </div>

  <a class="portal-link" href="#" onclick="return false;">茅ヶ崎市制度ポータルを見る</a>

</div>

<script>
function yen(value){
  return value.toLocaleString() + "円";
}

function percent(value, total){
  if(total <= 0) return "0.0%";
  return ((value / total) * 100).toFixed(1) + "%";
}

function calc(){

  const income = Number(document.getElementById("income").value);
  const family = Number(document.getElementById("family").value);
  const care = Number(document.getElementById("care").value);

  if(!income && income !== 0){
    document.getElementById("result").innerText = "前年所得を入力してください";
    return;
  }

  const familyCount = family || 0;
  const careCount = care || 0;

  // 茅ヶ崎市 令和7年度 簡易版
  const medicalIncomeRate = 0.0666;
  const supportIncomeRate = 0.0277;
  const careIncomeRate = 0.0262;

  const medicalPerCapita = 22432;
  const supportPerCapita = 9231;
  const carePerCapita = 9485;

  const medicalHousehold = 27755;
  const supportHousehold = 11421;
  const careHousehold = 8789;

  const medicalLimit = 660000;
  const supportLimit = 260000;
  const careLimit = 170000;

  const medicalRaw =
    Math.floor(income * medicalIncomeRate) +
    (familyCount * medicalPerCapita) +
    medicalHousehold;

  const supportRaw =
    Math.floor(income * supportIncomeRate) +
    (familyCount * supportPerCapita) +
    supportHousehold;

  const careRaw =
    Math.floor(income * careIncomeRate) +
    (careCount * carePerCapita) +
    careHousehold;

  const medical = Math.min(medicalRaw, medicalLimit);
  const support = Math.min(supportRaw, supportLimit);
  const careFee = Math.min(careRaw, careLimit);

  const total = medical + support + careFee;
  const monthly = Math.round(total / 12);

  document.getElementById("result").innerHTML = `
    <div class="result-box">
      <div class="result-row">
        <span class="result-label">医療分</span>
        <span class="result-value">${yen(medical)}</span>
      </div>
      <div class="result-row">
        <span class="result-label">後期支援金分</span>
        <span class="result-value">${yen(support)}</span>
      </div>
      <div class="result-row">
        <span class="result-label">介護分</span>
        <span class="result-value">${yen(careFee)}</span>
      </div>
    </div>

    <div class="total-box">
      <span class="total-label">年間保険料合計</span>
      <span class="total-value">${total.toLocaleString()}円</span>
      <div class="sub-metric">月額目安：${yen(monthly)}</div>
    </div>

    <div class="section-title">構成割合</div>
    <div class="percent-list">
      <div class="percent-item">
        <span>医療分の割合</span>
        <strong>${percent(medical, total)}</strong>
      </div>
      <div class="percent-item">
        <span>後期支援金分の割合</span>
        <strong>${percent(support, total)}</strong>
      </div>
      <div class="percent-item">
        <span>介護分の割合</span>
        <strong>${percent(careFee, total)}</strong>
      </div>
    </div>

    <div class="section-title">限度額チェック</div>
    <div class="percent-list">
      <div class="percent-item">
        <span>医療分</span>
        <span class="small">${medicalRaw > medicalLimit ? "限度額適用あり" : "限度額未達"}</span>
      </div>
      <div class="percent-item">
        <span>後期支援金分</span>
        <span class="small">${supportRaw > supportLimit ? "限度額適用あり" : "限度額未達"}</span>
      </div>
      <div class="percent-item">
        <span>介護分</span>
        <span class="small">${careRaw > careLimit ? "限度額適用あり" : "限度額未達"}</span>
      </div>
    </div>
  `;
}
</script>

</body>
</html>
