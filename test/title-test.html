<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="./css/common.css">
<title>国民健康保険料計算｜茅ヶ崎市 国保計算ツール</title>


</head>

<body>

<div class="wrap">

  <h1>茅ヶ崎市 国保計算ツール</h1>

<div class="subtitle">
（国民健康保険料シミュレーション）
</div>

<div class="mode-title">簡単計算</div>

  <label for="income">前年所得</label>
  <input id="income" type="text" inputmode="numeric" placeholder="例：3,000,000" onblur="formatNumber(this)">

  <label for="family">世帯人数</label>
  <input id="family" type="number" placeholder="例：3">

  <label for="preschool">未就学児人数（0〜6歳）</label>
  <input id="preschool" type="number" placeholder="例：1">

  <label for="care">介護保険人数（40〜64歳）</label>
  <input id="care" type="number" placeholder="例：1">

  <button onclick="calc()">計算する</button>

  <div class="result-title">計算結果</div>

  <div id="result"><span class="result-placeholder">ここに結果が表示されます</span></div>
  
  

    個人事業主の方など、所得で計算したい方は
   <a href="./kokuho-income.html">こちら</a>
  </div>
</div>

<div class="back-link">
<!-- 計算結果エリアの下あたり -->

<a href="./selector.html">制度ポータルへ戻る</a>

<script src="./js/engine.js"></script>
  
  <div class="note">
    ※このページは茅ヶ崎市向けの簡易計算版です。<br>
    ※基礎控除43万円を差し引いた簡易計算です。<br>
    ※軽減判定はA版の目安判定です。正式な判定ではありません。<br>
    ※未就学児軽減は均等割のみを対象に簡易反映しています。<br>
    ※実際の保険料は自治体の通知や公式案内でご確認ください。
  </div>


</body>
</html>
