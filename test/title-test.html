<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>国民健康保険料計算｜茅ヶ崎市 国保計算ツール</title>

<style>
body{
  font-family:sans-serif;
  margin:0;
  padding:20px;
  background:linear-gradient(180deg,#eef2ff 0%,#f8fafc 100%);
  color:#222;
}

.wrap{
  max-width:720px;
  margin:0 auto;
  background:#ffffff;
  padding:24px 20px 28px;
  border-radius:18px;
  border:1px solid #e5e7eb;
  box-shadow:0 10px 30px rgba(0,0,0,0.05);
  box-sizing:border-box;
}

h1{
  font-size:28px;
  margin:0 0 6px 0;
  font-weight:700;
  line-height:1.4;
  color:#0f172a;
}

.subtitle{
  font-size:14px;
  color:#6b7280;
  margin-bottom:28px;
}

label{
  display:block;
  font-size:15px;
  font-weight:700;
  margin-top:22px;
  margin-bottom:8px;
  color:#111827;
}

input{
  width:100%;
  padding:14px 12px;
  font-size:22px;
  font-weight:500;
  font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  border:2px solid #cbd5e1;
  border-radius:12px;
  background:#ffffff;
  color:#0f172a;
  box-sizing:border-box;
}

input:focus{
  outline:none;
  border-color:#2563eb;
  box-shadow:0 0 0 3px rgba(37,99,235,0.15);
}

input::placeholder{
  color:#9ca3af;
  font-size:22px;
  font-weight:400;
  font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
}

button{
  width:100%;
  margin-top:28px;
  padding:16px;
  font-size:18px;
  font-weight:700;
  border:none;
  border-radius:999px;
  background:#1d4ed8;
  color:#ffffff;
  cursor:pointer;
  box-shadow:0 6px 16px rgba(0,0,0,0.15);
}

button:hover{
  background:#1e40af;
}

button:active{
  transform:translateY(1px);
}

.result-title{
  margin-top:34px;
  font-size:18px;
  font-weight:700;
  color:#111827;
}

#result{
  margin-top:14px;
  padding:18px 16px;
  background:#f8fafc;
  border:2px solid #e5e7eb;
  border-radius:14px;
  min-height:28px;
  line-height:1.8;
  color:#111827;
  box-sizing:border-box;
}

.result-row{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:12px;
  margin-bottom:8px;
}

.result-label{
  font-size:17px;
  color:#374151;
  flex:1;
}

.amount{
  font-size:20px;
  font-weight:700;
  color:#0f172a;
  font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  text-align:right;
  white-space:nowrap;
}

.divider{
  margin:16px 0;
  border-top:2px solid #e5e7eb;
}

.total-title{
  font-size:18px;
  font-weight:700;
  color:#111827;
  margin-bottom:8px;
}

.total{
  display:block;
  font-size:40px;
  font-weight:800;
  line-height:1.2;
  color:#0f172a;
  font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  margin-bottom:8px;
}

.monthly{
  font-size:16px;
  font-weight:600;
  color:#475569;
  font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
}

.section-title{
  margin-top:20px;
  margin-bottom:10px;
  font-size:16px;
  font-weight:700;
  color:#111827;
}

.percent-box{
  margin-top:8px;
  padding:14px;
  background:#ffffff;
  border:1px solid #e5e7eb;
  border-radius:12px;
}

.percent-item{
  display:flex;
  justify-content:space-between;
  gap:12px;
  margin-bottom:8px;
  font-size:14px;
  color:#374151;
}

.percent-item:last-child{
  margin-bottom:0;
}

.reduction-box{
  margin-top:16px;
  padding:14px;
  background:#eff6ff;
  border:1px solid #bfdbfe;
  border-radius:12px;
}

.reduction-title{
  font-size:15px;
  font-weight:700;
  color:#1d4ed8;
  margin-bottom:8px;
}

.reduction-main{
  font-size:18px;
  font-weight:800;
  color:#0f172a;
  margin-bottom:6px;
}

.reduction-sub{
  font-size:13px;
  line-height:1.8;
  color:#475569;
}

.link-box{
  margin-top:18px;
  font-size:14px;
  line-height:1.7;
  color:#374151;
}

.link-box a{
  color:#2563eb;
  font-weight:600;
  text-decoration:none;
}

.link-box a:hover{
  text-decoration:underline;
}

.note{
  margin-top:18px;
  font-size:13px;
  line-height:1.8;
  color:#6b7280;
}
</style>
</head>

<body>

<div class="wrap">

  <h1>茅ヶ崎市 国保計算ツール</h1>

<div class="subtitle">
（国民健康保険料シミュレーション）
</div>

<div class="mode-title">簡単計算</div>

  <label for="income">前年所得</label>
  <input id="income" type="text" inputmode="numeric" placeholder="例：3,000,000" onblur="formatNumber(this)">

  <label for="family">世帯人数</label>
  <input id="family" type="number" placeholder="例：3">

  <label for="preschool">未就学児人数（0〜6歳）</label>
  <input id="preschool" type="number" placeholder="例：1">

  <label for="care">介護保険人数（40〜64歳）</label>
  <input id="care" type="number" placeholder="例：1">

  <button onclick="calc()">計算する</button>

  <div class="result-title">計算結果</div>

  <div id="result">
    ここに結果が表示されます
  </div>
  

    個人事業主の方など、所得で計算したい方は
   <a href="./kokuho-income.html">こちら</a>
  </div>
</div>

<div class="back-link">
<!-- 計算結果エリアの下あたり -->

<a href="./selector.html">制度ポータルへ戻る</a>

<script src="./js/engine.js"></script>
  
  <div class="note">
    ※このページは茅ヶ崎市向けの簡易計算版です。<br>

    ※軽減判定はA版の目安判定です。正式な判定ではありません。<br>
    ※未就学児軽減は均等割のみを対象に簡易反映しています。<br>
    ※実際の保険料は自治体の通知や公式案内でご確認ください。
  </div>


</body>
</html>
