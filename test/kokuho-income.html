<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>茅ヶ崎市 国保 所得ベース計算</title>
  <style>
body{
  font-family:sans-serif;
  margin:0;
  padding:20px;
  background:linear-gradient(180deg,#eef2ff 0%, #f8fbff 100%);
  color:#222;
}

.wrap{
  max-width:720px;
  margin:0 auto;
  background:#ffffff;
  padding:24px 20px 28px;
  border-radius:18px;
  border:1px solid #e5e7eb;
  box-shadow:0 10px 30px rgba(0,0,0,0.05);
  box-sizing:border-box;
}

.card{
  background:transparent;
  border-radius:0;
  padding:0;
  box-shadow:none;
}

h1{
  font-size:30px;
  margin:0 0 6px 0;
  font-weight:700;
  line-height:1.4;
  color:#0f172a;
  text-align:center;
}

.subtitle{
  font-size:14px;
  color:#6b7280;
  margin-bottom:28px;
  text-align:center;
}

.mode-title{
  margin-top:6px;
  margin-bottom:12px;
  font-size:20px;
  font-weight:700;
  color:#1d4ed8;
  text-align:center;
}

label{
  display:block;
  font-size:15px;
  font-weight:700;
  margin-top:22px;
  margin-bottom:8px;
  color:#111827;
}

input{
  width:100%;
  padding:14px 12px;
  font-size:22px;
  font-weight:500;
  font-family:system-ui,-apple-system,"Segoe UI",sans-serif;
  border:2px solid #cbd5e1;
  border-radius:12px;
  background:#ffffff;
  color:#0f172a;
  box-sizing:border-box;
}

input:focus{
  outline:none;
  border-color:#2563eb;
  box-shadow:0 0 0 3px rgba(37,99,235,0.15);
}

input::placeholder{
  color:#9ca3af;
  font-size:22px;
  font-weight:400;
  font-family:system-ui,-apple-system,"Segoe UI",sans-serif;
}

button{
  width:100%;
  margin-top:28px;
  padding:16px;
  font-size:18px;
  font-weight:700;
  border:none;
  border-radius:999px;
  background:#1d4ed8;
  color:#ffffff;
  cursor:pointer;
  box-shadow:0 6px 16px rgba(0,0,0,0.15);
}

button:hover{
  background:#1e40af;
}

button:active{
  transform:translateY(1px);
}

.result-title{
  margin-top:34px;
  font-size:18px;
  font-weight:700;
  color:#111827;
}

#result{
  margin-top:14px;
  padding:18px 16px;
  background:#f8fafc;
  border:2px solid #e5e7eb;
  border-radius:14px;
  min-height:28px;
  line-height:1.8;
  color:#111827;
  box-sizing:border-box;
}

.result-placeholder{
  color:#9ca3af;
}
</style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>茅ヶ崎市 国保計算ツール</h1>
<div class="subtitle">前年所得をもとにした国民健康保険料シミュレーション</div>

<div class="mode-title">所得ベース計算</div>

      <label for="income">前年所得</label>
      <input id="income" type="text" inputmode="numeric" placeholder="例：2000000">

      <label for="family">世帯人数</label>
      <input id="family" type="number" placeholder="例：3">

      <label for="preschool">未就学児人数（0〜6歳）</label>
      <input id="preschool" type="number" placeholder="例：1">

      <label for="care">介護保険人数（40〜64歳）</label>
      <input id="care" type="number" placeholder="例：1">

      <button onclick="calc()">計算する</button>

      <div class="result-title">計算結果</div>
      <div id="result">
  <span class="result-placeholder">ここに結果が表示されます</span>
</div>

      <div class="back-link">
        <a href="./selector.html">制度ポータルへ戻る</a>
      </div>

      <div class="note">
        ※このページは茅ヶ崎市向けの所得ベース計算版です。<br>
        ※基礎控除43万円を差し引いた簡易計算です。<br>
        ※軽減判定は未反映です。正式な判定ではありません。<br>
        ※未就学児軽減は今後反映予定です。<br>
        ※実際の保険料は自治体の通知や公式案内でご確認ください。
      </div>
    </div>
  </div>

  <script src="./js/engine.js"></script>
</body>
</html>
